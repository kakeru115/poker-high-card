name: Next.js check

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-check.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-check.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
